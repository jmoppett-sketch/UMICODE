# ============================================================
# UMICODE configuration
# Version: 0.1
# ============================================================

project:
  name: UMICODE
  version: "0.1"
  random_seed: 42
  application: Ig_TCR_MRD

platform:
  sequencing: ONT
  read_mode: duplex
  chemistry: null
  basecaller: null

cassette:

  left:
    adapter: ""
    anchor:
      sequence: null
      length: 8
    spacer:
      sequence: "AT"
    umi:
      length: 16

  right:
    adapter: ""
    anchor:
      sequence: null
      length: 8
    spacer:
      sequence: "TA"
    umi:
      length: 16

constraints:

  gc:
    minimum: 0.40
    maximum: 0.60

  homopolymer:
    maximum_length: 3

  hamming:
    minimum_distance: 4

  secondary_structure:
    enabled: false

  avoid_anchor_overlap: true

design:

  umi:
    left_codebook_size: 32
    right_codebook_size: 32

simulation:

  enabled: true
  substitution_rate: null
  insertion_rate: null
  deletion_rate: null
  reads_per_molecule: null

decoder:

  probabilistic: true
  retain_ambiguous_reads: true
  maximum_umi_distance: 2

output:

  output_directory: output